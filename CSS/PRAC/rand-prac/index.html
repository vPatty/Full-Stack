<!doctype html>
<html>
  <head>
    <style>
      .box {
        width: 200px;
        padding: 20px;
        border: 5px solid black;
        background: #f7d48b;
        margin-bottom: 12px;
      }
      .content-box { box-sizing: content-box; } /* default */
      .border-box { box-sizing: border-box; }
    </style>
  </head>
  <body>
    <div class="box content-box">content-box</div>
    <div class="box border-box">border-box</div>
  </body>
</html>
