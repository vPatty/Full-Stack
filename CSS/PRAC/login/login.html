<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>
<body>
    
    <div class="login-container">
        <form method="post">

            <div class="credentials-container">
                <label for="user">Username</label>
                <input class="username" type="text" id="user" placeholder="Enter username" required>

                <br>

                <label for="pass">Password</label>
                <input class="password" type="password" id="pass" placeholder="Enter Password" required>
            </div>

            <br>

            <button class="button">Submit</button>

            
        </form>
    
    </div>

</body>
</html>
