<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">  
  <title>Smart Notes</title>
</head>
<body>
  <div class="container">
    <h1>Smart Notes</h1>

    <div class="input-container">
      <textarea class="input-val" name="notes" id="notes"></textarea>
    </div>

    <div class="filter-container">
      <input class="date-val" type="date">
      <button onclick="addToArray();">Add Note</button>
    </div>

    <div class="notes-container"></div>
  </div>

  
  <script src="notes.js"></script>
</body>
</html>
