<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart Project</title>

  <style>
    .btn {
      border: 2px solid black;
      border-radius: 4px;
      padding: 5px;
      display: inline-block;
      margin-right: 5px;
      background-color: black;
      color: white;
    }
  </style>
</head>
<body>

  <p>Cart Quantity</p>

    <button class="btn" onclick="
        console.log(`Cart quantity: ${quantity}`);
    ">Show Quantity</button>

    <button class="btn" onclick="
        if(quantity + 1 > 10){
            console.log('Cart is full');
        } else {
            quantity ++;
            console.log(`Cart quantity: ${quantity}`);
        }
    ">Add to Cart</button>

    <button class="btn" onclick="
        if(quantity - 2 < 0){
            console.log('Not enough items in your cart');
        }  else {
            quantity -= 2;
            console.log(`Cart quantity: ${quantity}`);
        }
     ">-2</button>

    <button class="btn" onclick="
        if(quantity - 3 < 0){
            console.log('Not enough items in your cart');
        }  else {
            quantity -= 3;
            console.log(`Cart quantity: ${quantity}`);
        }
     ">-3</button>
     
    <button class="btn" onclick="
        if(quantity + 2 > 10){
            console.log('Cart is full');
        } else {
            quantity += 2;
            console.log(`Cart quantity: ${quantity}`);
        }
    ">+2</button>

    <button class="btn" onclick="
        if(quantity + 3 > 10){
            console.log('Cart is full');
        } else {
            quantity += 3;
            console.log(`Cart quantity: ${quantity}`);
        }
    ">+3</button>

    <button class="btn" onclick="
        if(quantity + 4 > 10){
            console.log('Cart is full');
        } else {
            quantity += 4;
            console.log(`Cart quantity: ${quantity}`);
        }
    ">+4</button>

    <button class="btn" onclick="
        if(quantity + 5 > 10){
            console.log('Cart is full');
        } else {
            quantity += 5;
            console.log(`Cart quantity: ${quantity}`);
        }
    ">+5</button>

    <button class="btn" onclick="
        if(quantity - 1 < 0){
            console.log('Not enough items in your cart');
        }  else {
            quantity --;
            console.log(`Cart quantity: ${quantity}`);
        }
    ">Remove item from cart</button>

    <button class="btn" onclick="
    quantity = 0; console.log('Cart was reset...'); console.log(`Cart quantity: ${quantity}`);
    ">Reset Cart</button>


  <script>
    let quantity = 0;

  </script>
</body>
</html>
