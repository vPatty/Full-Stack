<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="style.css">
    <title>Rock Paper Scissors</title>

  </head>
  <body>
    <p class="title">Rock Paper Scissors</p>
    <button onclick="
      playGame('rock');
    " class="move-button"><img class="move-icon" src="images/rock-emoji.png" alt="rock-emoji"></button>

    <button onclick="
      playGame('paper');
    " class="move-button"><img class="move-icon" src="images/paper-emoji.png" alt="paper-emoji"></button>

    <button onclick="
      playGame('scissors');
    " class="move-button"><img class="move-icon" src="images/scissors-emoji.png" alt="scissor-emoji"></button>

    <p class="js-result result"></p>
    <p class="js-moves"></p>
    <p class="js-score score"></p>

    <button onclick="
      score.wins = 0;
      score.losses = 0;
      score.ties = 0;
      localStorage.removeItem('score');
      updateScoreElement();
    " class="reset-score-button">Reset Score</button>


    <script src="10-rock-paper-scissors.js"></script>
  </body>
</html>
