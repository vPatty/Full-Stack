<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    
    <p>Rock Paper Scissors</p>

    <button onclick="playGame('rock')">Rock</button>
    <button onclick="playGame('paper');">Paper</button>
    <button onclick="playGame('scissors');">Scissors</button>
    <button onclick="score.win = 0; score.loss = 0; score.ties = 0; localStorage.removeItem('score');">Reset Score</button>

    <script>

      let score = JSON.parse(localStorage.getItem('score')) || {
        win: 0,
        loss: 0,
        ties: 0
      };

      // if (!score){ 
      //   score = {
      //     win: 0,
      //     loss: 0,
      //     ties: 0
      //   };

      // }

      function playGame(playerMove) {
        const computerMove = getComputerMove();

        let result = '';
        if(playerMove === 'scissors'){
          if(computerMove === 'rock'){
            result = 'lose!!'
          } else if(computerMove === 'paper'){
            result = 'win!!';
          } else {
            result = 'tie!!';
          }

        } else if(playerMove === 'paper'){
          if(computerMove === 'rock'){
            result = 'win!!'
          } else if(computerMove === 'paper'){
            result = 'tie!!';
          } else {
            result = 'lose!!';
          }

        } else {
          if(computerMove === 'rock'){
            result = 'tie!!'
          } else if(computerMove === 'paper'){
            result = 'lose!!';
          } else {
            result = 'win!!';
          }
        }

        if(result === 'win!!'){
          score.win +=1;
        } else if(result === 'lose!!'){
          score.loss +=1;
        } else if(result === 'tie!!'){
          score.ties +=1;
        }

        localStorage.setItem('score', JSON.stringify(score));

        alert(`You chose ${playerMove}. Computer chose ${computerMove}. You ${result}
Wins: ${score.win}, Losses: ${score.loss}, Ties: ${score.ties}`);
      }
      
      function getComputerMove() {
        const ranNum = Math.random();
        let computerMove = '';

        if (ranNum >= 0 && ranNum < 1/3){
            computerMove = 'rock';
        } else if (ranNum >= 1/3 && ranNum <= 2/3){
            computerMove = 'paper';
        } else {
            computerMove = 'scissors';
        }
        return computerMove;
      }

    </script>
</body>
</html>
