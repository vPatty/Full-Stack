<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Click</title>
</head>
<body>
  <button onclick="console.log(greetUser())">Click Me!</button>
  <script>

    function greetUser(){
      let name = 'Patrick';
      return `Hello ${name}!`
    }
  </script>
</body>
</html>
