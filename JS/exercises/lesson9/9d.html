<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  
  <input class="js-input" type="text" placeholder="Enter name" onkeydown="if(event.key === 'Enter'){
      displayMessage();
  }">

  <button class="js-btn" onclick="
    displayMessage();
  ">Submit</button>

  <p class="js-text"></p>

  <script>
    function displayMessage(){
      const inputElement = document.querySelector('.js-input');
      document.querySelector('.js-text').innerHTML = `Your name is: ${inputElement.value}`;
    }
  </script>

</body>
</html>
