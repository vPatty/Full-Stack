<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  
  <script>
    function convertToFarenheit(celsius){
      return (celsius * 9 / 5) + 32;
    }

    function convertToCelsisu(farenheit){
      return (farenheit - 32) * 5 / 9;
    }

    function convertTemperature(degrees, unit){
      if(unit === 'C'){
        const result = convertToFarenheit(degrees);
        return `${result}F`;
      } else if(unit === 'F'){
        const result = convertToCelsisu(degrees);
        return `${result}C`;
      } else {
        console.log('Invalid input, please select either C or F');
      }
    }

   
    console.log(convertTemperature(25, 'C'));
    console.log(convertTemperature(86, 'F'));
    console.log(convertTemperature(25, 's'));
  </script>
</body>
</html>
