<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    let strArr = ['hello', 'world', 'search', 'search'];

    for(let i = 0; i < strArr.length; i++){
      if(strArr[i] === 'search'){
        console.log(i);
        break;
      } else {
        console.log(-1);
      }

    }







    function findIndex(array, word){
      for(let i = 0; i < array.length; i++){
        if(array[i] === word){
          return i;
        }
      }

      return -1;
    }

    console.log(findIndex(['green', 'red', 'blue', 'red'], 'blue'));

    console.log('--------');





    function removeEgg(foods){
      let newArr = [];
      let index = 0;
      for(let i = 0; i < foods.length; i++){
        if(foods[i] === 'egg' && index < 2){
          index++;
          continue;
        } else {
          newArr.push(foods[i]);
        }
      }
      return newArr;
    }

    console.log(removeEgg(['egg', 'apple', 'egg', 'egg', 'ham']));

    console.log('--------');


    for(let i = 1; i <= 20; i++){
      if(i % 3 === 0){
        console.log('Fizz');
      } else if(i % 5 === 0){
        console.log('Buzz');
      } else if(i % 3 === 0 && i % 5 === 0){
        console.log('FizzBuzz');
      } else {
        console.log(i);
      }
    }



  </script>
</body>
