<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>

    <!-- START FORM -->
    <form action="results.html" method="get" enctype="multipart/form-data">
        <div>
            <label for="name">Name</label>
            <input type="text" name="name-field" id="name" placeholder="username" required>
        </div>

        <div>
            <label for="email">Email</label>
            <input type="email" name="email-field" id="email">
        </div>

        <div>
            <label for="age">Age</label>
            <input type="number" name="age-field" id="age-field" min="1" max="150">
        </div>

        <div>
            <label for="date">Birthdate</label>
            <input type="date" name="date-field" id="date">
        </div>

        <br>

        <div>
            Favorite Food
            <div>
                <label for="apple">Apple</label>
                <input type="checkbox" name="apple" id="apple">
            </div>
            <div>
                <label for="orange">Orange</label>
                <input type="checkbox" name="orange" id="orange">
            </div>
        </div>

        <br>

        <div>
            Gender
            <div>
                <label for="male">Male</label>
                <input type="radio" name="gender" id="male" value="male">
            </div>
            <div>
                <label for="female">Female</label>
                <input type="radio" name="gender" id="female" value="female">
            </div>
        </div>

        <div>
            <label for="eyeColor">Eye Color</label>
            <select name="eyeColor" id="eyeColor">
                <option value="Red">Red</option>
                <option value="Blue">Blue</option>
                <option value="Green">Green</option>
            </select>
        </div>

        <div>
            <label for="bio">Bio</label>
            <textarea name="bio" id="bio"></textarea>
        </div>

        <div>
            <label for="file">File</label>
            <input type="file" name="file" id="file">
        </div>

        <div>
            <label for="phone">Phone</label>
            <input type="tel" name="phone" id="phone">
        </div>

        <div>
            <label for="url">URL</label>
            <input type="url" name="url" id="url">
        </div>

        <div>
            <label for="color">Color</label>
            <input type="color" name="color" id="color">
        </div>

       
        <div>
            <label for="password">Password</label>
            <input type="password" name="password-field" id="password" required>
        </div>

        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
    <!-- END FORM -->
    
</body>
</html>
